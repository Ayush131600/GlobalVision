<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Verify Code | Global Vision</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.55),
                    rgba(0, 0, 0, 0.55)),
                url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee");
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 420px;
            background: #ffffff;
            border-radius: 14px;
            padding: 32px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        .header h2 {
            margin: 0 0 10px;
            font-size: 22px;
            font-weight: 600;
        }

        .header p {
            font-size: 13px;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            margin-bottom: 8px;
            color: #444;
            font-weight: 600;
        }

        input {
            width: 100%;
            height: 42px;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 18px;
            text-align: center;
            letter-spacing: 5px;
            font-weight: bold;
        }

        input:focus {
            outline: none;
            border-color: #17a2b8;
        }

        button {
            width: 100%;
            height: 44px;
            background: #17a2b8;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background: #138496;
        }

        .resend-link {
            text-align: center;
            font-size: 13px;
            margin-top: 20px;
        }

        .resend-link a {
            color: #17a2b8;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <h2>Verify Code</h2>
            <p>Please enter the 6-digit verification code sent to <strong>{{ email }}</strong>.</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            
            {% if messages %}
            {% for message in messages %}
            <div style="color: #dc3545; font-size: 13px; margin-bottom: 15px;">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}

            <div class="form-group">
                <label for="otp">Verification Code</label>
                <input type="text" name="otp" id="otp" maxlength="6" placeholder="000000" required autofocus>
            </div>

            <button type="submit">VERIFY CODE</button>
        </form>

        <div class="resend-link">
            <p>Didn't receive code? <a href="{% url 'account:password_reset' %}">Request again</a></p>
        </div>
    </div>

</body>

</html>
