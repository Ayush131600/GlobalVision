<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Set New Password | Global Vision</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.55),
                    rgba(0, 0, 0, 0.55)),
                url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee");
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 420px;
            background: #ffffff;
            border-radius: 14px;
            padding: 32px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        .header h2 {
            margin: 0 0 10px;
            font-size: 22px;
            font-weight: 600;
        }

        .header p {
            font-size: 13px;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            margin-bottom: 8px;
            color: #444;
            font-weight: 600;
        }

        input {
            width: 100%;
            height: 42px;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #17a2b8;
        }

        button {
            width: 100%;
            height: 44px;
            background: #17a2b8;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background: #138496;
        }

        .errorlist {
            color: #dc3545;
            font-size: 13px;
            padding-left: 0;
            list-style: none;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <h2>Set New Password</h2>
            <p>Verification successful! You can now set your new password below.</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            
            {% if messages %}
            {% for message in messages %}
            <div style="color: #dc3545; font-size: 13px; margin-bottom: 15px;">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}

            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" name="password" id="password" placeholder="Minimum 8 characters" required>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" name="confirm_password" id="confirm_password" placeholder="Repeat new password" required>
            </div>

            <button type="submit">UPDATE PASSWORD</button>
        </form>
    </div>

</body>

</html>
