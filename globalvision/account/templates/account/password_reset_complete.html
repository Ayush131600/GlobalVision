<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Password Reset Complete | Global Vision</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.55),
                    rgba(0, 0, 0, 0.55)),
                url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee");
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 420px;
            background: #ffffff;
            border-radius: 14px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .header h2 {
            margin: 0 0 15px;
            font-size: 22px;
            font-weight: 600;
            color: #1e293b;
        }

        .header p {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .icon {
            font-size: 48px;
            color: #28a745;
            margin-bottom: 20px;
        }

        .login-btn {
            display: inline-block;
            width: 100%;
            padding: 12px;
            background: #17a2b8;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .login-btn:hover {
            background: #138496;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="icon">✅</div>
        <div class="header">
            <h2>Success!</h2>
            <p>Your password has been reset successfully. You can now log in with your new password.</p>
        </div>

        <a href="{% url 'account:login' %}" class="login-btn">LOG IN NOW</a>
    </div>

</body>

</html>
